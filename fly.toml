# fly.toml app configuration file generated for term400 on 2026-05-29T22:36:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'term400'
primary_region = 'ams'

[build]
  builder = 'paketobuildpacks/builder:base'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
